<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" width="820" height="680" role="img" aria-labelledby="mb-badge-title mb-badge-desc">
  <title id="mb-badge-title">Menton Badge</title>
  <desc id="mb-badge-desc">Menton Builders badge: interlocking diamonds above the MENTON wordmark. Used for hats, stamps, social avatars.</desc>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');</style>
  </defs>
  <!-- Icon, centered horizontally at x=410, top at y=30 -->
  <g transform="translate(285, 30)" fill="none" stroke="#928E85" stroke-width="18" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10">
    <polygon points="125,0 250,125 125,250 0,125"/>
    <path d="M 250 185 L 125 310"/>
    <path d="M 125 310 L 0 185"/>
    <path d="M 125 60 L 210 145"/>
    <path d="M 230 165 L 250 185"/>
    <path d="M 0 185 L 20 165"/>
    <path d="M 40 145 L 125 60"/>
  </g>
  <!-- MENTON wordmark below icon. Icon bottom = 30+310 = 340. Gap 60 => MENTON center at ~465. -->
  <text x="410" y="490" text-anchor="middle" dominant-baseline="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="180" letter-spacing="0.01em" fill="#2D2D2D">MENTON</text>
</svg>
