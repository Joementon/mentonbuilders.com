<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 310" width="900" height="310" role="img" aria-labelledby="mb-h-title mb-h-desc">
  <title id="mb-h-title">Menton Builders</title>
  <desc id="mb-h-desc">Menton Builders horizontal lockup: interlocking diamond icon at left, MENTON above BUILDERS at right.</desc>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@500&amp;display=swap');</style>
  </defs>

  <!-- Icon at left (0,0)–(250,310) -->
  <g fill="none" stroke="#928E85" stroke-width="18" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10">
    <polygon points="125,0 250,125 125,250 0,125"/>
    <path d="M 250 185 L 125 310"/>
    <path d="M 125 310 L 0 185"/>
    <path d="M 125 60 L 210 145"/>
    <path d="M 230 165 L 250 185"/>
    <path d="M 0 185 L 20 165"/>
    <path d="M 40 145 L 125 60"/>
  </g>

  <!-- MENTON — baseline centered above midpoint of icon vertical span -->
  <text x="310" y="155" text-anchor="start" dominant-baseline="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="160" letter-spacing="0.01em" fill="#2D2D2D">MENTON</text>

  <!-- BUILDERS — below MENTON, tight tracking reduced slightly for horizontal balance -->
  <text x="312" y="262" text-anchor="start" dominant-baseline="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="62" letter-spacing="0.22em" fill="#928E85">BUILDERS</text>
</svg>
