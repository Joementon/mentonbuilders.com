<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 310" width="250" height="310" role="img" aria-labelledby="mb-icon-title mb-icon-desc">
  <title id="mb-icon-title">Menton Builders Mark</title>
  <desc id="mb-icon-desc">Two interlocking diamonds woven at their crossings, in warm mineral gray.</desc>
  <!--
    Geometry (derived from brand reference JPG):
      Upper diamond B: center (125, 125), half-diagonal 125.
        T_B(125,  0)  R_B(250, 125)  Bot_B(125, 250)  L_B(  0, 125)
      Lower diamond A: center (125, 185), half-diagonal 125.
        T_A(125, 60)  R_A(250, 185)  Bot_A(125, 310)  L_A(  0, 185)
    Crossings:
      Right: (220, 155) — B's lower-right edge × A's upper-right edge.
      Left:  ( 30, 155) — B's lower-left  edge × A's upper-left  edge.
    Weave (matches reference):
      B (upper diamond) passes OVER A at both crossings. A is under.
      So on diamond A, two edges have gaps:
        - A upper-right edge: gap at (220, 155)
        - A upper-left  edge: gap at ( 30, 155)
      Diamond B is drawn unbroken.
  -->
  <g fill="none" stroke="#928E85" stroke-width="18" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10">
    <!-- Diamond B (upper), drawn complete -->
    <polygon points="125,0 250,125 125,250 0,125"/>

    <!-- Diamond A (lower), drawn with two edges broken so B shows on top at the crossings -->
    <!-- A lower-right edge: R_A -> Bot_A (unbroken) -->
    <path d="M 250 185 L 125 310"/>
    <!-- A lower-left edge: Bot_A -> L_A (unbroken) -->
    <path d="M 125 310 L 0 185"/>
    <!-- A upper-right edge: T_A -> R_A, broken at (220, 155) -->
    <!-- Direction from T_A(125,60) to R_A(250,185) is (+1,+1)/sqrt2; gap of ±14 along the edge => ±(10,10) -->
    <path d="M 125 60 L 210 145"/>
    <path d="M 230 165 L 250 185"/>
    <!-- A upper-left edge: L_A -> T_A, broken at (30, 155) -->
    <!-- Direction from L_A(0,185) to T_A(125,60) is (+1,-1)/sqrt2; gap of ±14 along the edge => ±(10,-10) -->
    <path d="M 0 185 L 20 165"/>
    <path d="M 40 145 L 125 60"/>
  </g>
</svg>
