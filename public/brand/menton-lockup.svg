<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 820" width="820" height="820" role="img" aria-labelledby="mb-lockup-title mb-lockup-desc">
  <title id="mb-lockup-title">Menton Builders</title>
  <desc id="mb-lockup-desc">Menton Builders stacked lockup: interlocking diamonds above the MENTON BUILDERS wordmark.</desc>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@500&amp;display=swap');</style>
  </defs>

  <!-- Icon (centered at x=410). Icon is 250 wide, 310 tall. Place top at y=30, centered horizontally. -->
  <!-- Icon center X = 410, icon left = 410 - 125 = 285. -->
  <g transform="translate(285, 30)" fill="none" stroke="#928E85" stroke-width="18" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10">
    <polygon points="125,0 250,125 125,250 0,125"/>
    <path d="M 250 185 L 125 310"/>
    <path d="M 125 310 L 0 185"/>
    <path d="M 125 60 L 210 145"/>
    <path d="M 230 165 L 250 185"/>
    <path d="M 0 185 L 20 165"/>
    <path d="M 40 145 L 125 60"/>
  </g>

  <!-- MENTON text. Icon bottom at y=30+310=340. Gap 60 => MENTON baseline area starts at y=400.
       Match reference proportions: MENTON width ~ 3.22x icon width = 805. Set font-size so that
       rendered MENTON is ~800 wide with Playfair Display 700.
       Playfair Display 700 "MENTON" width: roughly 3.3× font-size, so font-size ≈ 240 gives width ≈ 790.
       Vertical center of MENTON band ~ 340+60+127/2 = 463. Use dominant-baseline="middle".
  -->
  <text x="410" y="465" text-anchor="middle" dominant-baseline="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="180" letter-spacing="0.01em" fill="#2D2D2D">MENTON</text>

  <!-- BUILDERS text. MENTON bottom ~ 465+127/2 = 528. Gap 45 => BUILDERS top ~ 575. Vertical center ~ 610.
       BUILDERS width in reference = 554 (2.22x icon). With Inter 500 and letter-spacing 0.25em, achieve similar width.
       Font-size ~ 74 yields BUILDERS width ~ 550 with 0.25em tracking.
  -->
  <text x="410" y="625" text-anchor="middle" dominant-baseline="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="78" letter-spacing="0.22em" fill="#928E85">BUILDERS</text>
</svg>
