<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 820" width="820" height="820" role="img" aria-labelledby="mb-lockup-dark-title mb-lockup-dark-desc">
  <title id="mb-lockup-dark-title">Menton Builders (Dark BG)</title>
  <desc id="mb-lockup-dark-desc">Menton Builders stacked lockup rendered in warm ivory (icon + BUILDERS) and ivory (MENTON) for use on dark backgrounds.</desc>
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;family=Inter:wght@500&amp;display=swap');</style>
  </defs>

  <!-- Icon in ivory for dark backgrounds -->
  <g transform="translate(285, 30)" fill="none" stroke="#F8F4ED" stroke-width="18" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="10">
    <polygon points="125,0 250,125 125,250 0,125"/>
    <path d="M 250 185 L 125 310"/>
    <path d="M 125 310 L 0 185"/>
    <path d="M 125 60 L 210 145"/>
    <path d="M 230 165 L 250 185"/>
    <path d="M 0 185 L 20 165"/>
    <path d="M 40 145 L 125 60"/>
  </g>

  <!-- MENTON in ivory -->
  <text x="410" y="465" text-anchor="middle" dominant-baseline="middle"
        font-family="'Playfair Display', Georgia, 'Times New Roman', serif"
        font-weight="700" font-size="180" letter-spacing="0.01em" fill="#F8F4ED">MENTON</text>

  <!-- BUILDERS in ivory (the Icon+BUILDERS color role, but inverted for dark bg) -->
  <text x="410" y="625" text-anchor="middle" dominant-baseline="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-weight="500" font-size="78" letter-spacing="0.22em" fill="#F8F4ED">BUILDERS</text>
</svg>
